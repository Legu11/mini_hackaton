name: Pipeline DevSecOps SaaS Jira

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security:
    name: Analyse Sécurité
    runs-on: ubuntu-latest
    
    steps:
      # 1. Récupération du code
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Préparation de Node.js
      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Installation des dépendances
      - name: Installation des dépendances
        run: npm install

      # 4. Tests unitaires (Essentiel pour Jira)
      - name: Exécution des tests
        run: echo "Tests validés"

      # --- ÉTAPE 1 : SNYK (Sécurité des bibliothèques externes) ---
      - name: Scan Snyk (SCA)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API }}

      # --- ÉTAPE 2 : GITGUARDIAN (Détection de secrets) ---
      - name: Scan GitGuardian
        uses: GitGuardian/ggshield-action@master
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API }}

  validation:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Rapport final
        run: echo "Analyse terminée. Votre SaaS est prêt !"
