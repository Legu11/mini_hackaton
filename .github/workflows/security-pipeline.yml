name: Pipeline DevSecOps SaaS Jira (Snyk Powered)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  security:
    name: Analyse Sécurité Globale
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installation des dépendances
        run: npm install

      # --- ÉTAPE 1 : SNYK OPEN SOURCE (Bibliothèques externes) ---
      - name: Scan Snyk Open Source (SCA)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API }}

      # --- ÉTAPE 2 : SNYK CODE (Ton code source - Remplace Sonar/Codacy) ---
      - name: Scan Snyk Code (SAST)
        run: |
          npm install -g snyk
          snyk code test --sarif-file-output=snyk-code.sarif
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_API }}

      # --- ÉTAPE 3 : GITGUARDIAN (Secrets) ---
      - name: Scan GitGuardian (Secrets)
        uses: GitGuardian/ggshield-action@master
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API }}

  deploy-validation:
    needs: security
    runs-on: ubuntu-latest
    steps:
      - name: Rapport
        run: echo "Analyse Snyk + GitGuardian terminée pour le SaaS Jira."
